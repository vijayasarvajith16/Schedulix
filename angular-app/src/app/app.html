<!-- ── Register page: no sidebar, full-screen ── -->
<ng-container *ngIf="isRegisterPage">
    <router-outlet></router-outlet>
</ng-container>

<!-- ── All other pages: sidebar + main layout ── -->
<div class="d-flex" style="min-height: 100vh; background: #f4f6fb;" *ngIf="!isRegisterPage">
    <!-- Sidebar ported from React -->
    <nav class="d-flex flex-column text-white position-fixed h-100"
        style="width: 240px; background: linear-gradient(180deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); top: 0; left: 0; z-index: 100;">
        <!-- Logo -->
        <div class="p-4" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
            <div class="d-flex align-items-center">
                <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                    style="width: 38px; height: 38px; background: linear-gradient(135deg,#667eea,#764ba2);">
                    <i class="bi bi-calendar3 text-white"></i>
                </div>
                <div>
                    <div class="fw-bold" style="font-size: 0.9rem;">TimetableBot</div>
                    <div class="opacity-50" style="font-size: 0.7rem;">Academic Scheduler</div>
                </div>
            </div>
        </div>

        <!-- User Info -->
        <div class="px-4 py-3" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
            <div class="d-flex align-items-center">
                <div class="rounded-circle d-flex align-items-center justify-content-center me-3 fw-bold"
                    style="width: 36px; height: 36px; background: rgba(255,255,255,0.15); font-size: 0.9rem;">
                    {{ getUserInitial() }}
                </div>
                <div>
                    <div class="fw-semibold small">{{ getUserName() }}</div>
                    <span class="badge px-2" style="background: rgba(255,255,255,0.15); font-size: 0.65rem;">
                        {{ getUserRole() }}
                    </span>
                </div>
            </div>
        </div>

        <!-- Nav Links -->
        <div class="flex-grow-1 py-3 overflow-auto">
            <a href="http://localhost:4200/faculty-dashboard"
                class="d-flex align-items-center px-4 py-2 text-white text-decoration-none"
                style="background: rgba(102,126,234,0.3); border-right: 3px solid #667eea; transition: all 0.2s; font-size: 0.88rem;">
                <i class="bi bi-person-badge me-3" style="font-size: 1rem; color: #667eea;"></i>
                <span style="color: white;">My Timetable</span>
            </a>
            <!-- Link back to React app Batch View -->
            <a href="http://localhost:3000/timetable"
                class="d-flex align-items-center px-4 py-2 text-white text-decoration-none"
                style="background: transparent; border-right: 3px solid transparent; transition: all 0.2s; font-size: 0.88rem;">
                <i class="bi bi-table me-3" style="font-size: 1rem; color: rgba(255,255,255,0.7);"></i>
                <span style="color: rgba(255,255,255,0.75);">Batch View</span>
            </a>
        </div>

        <!-- Logout -->
        <div class="p-4" style="border-top: 1px solid rgba(255,255,255,0.1);">
            <button class="btn w-100 text-white d-flex align-items-center justify-content-center gap-2 py-2"
                style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;"
                (click)="logout()">
                <i class="bi bi-box-arrow-right"></i>
                <span class="small fw-semibold">Logout</span>
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow-1 p-4" style="margin-left: 240px; min-height: 100vh;">
        <div style="max-width: 1200px;">
            <router-outlet></router-outlet>
        </div>
    </main>

</div>
